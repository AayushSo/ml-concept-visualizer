<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalar vs. SIMD Step-Through</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-btn {
            background-color: #3b82f6 !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }
        .data-element {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }
        .ram-active {
            fill: #dbeafe !important;
            stroke: #3b82f6 !important;
            stroke-width: 2.5px !important;
        }
        .reg-active {
            stroke: #fb923c !important;
            stroke-width: 3px !important;
            fill: #fff7ed !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Step-Through: Scalar vs. SIMD</h1>
                <p class="text-slate-500">Manually step through the processing pipeline stages</p>
            </div>
            
            <div class="flex flex-col items-end gap-3">
                <div class="bg-white p-1 rounded-xl shadow-sm border border-slate-200 flex gap-1">
                    <button id="btn-scalar" onclick="changeMode('scalar')" class="px-6 py-2 rounded-lg font-bold text-sm transition-all active-btn">SCALAR</button>
                    <button id="btn-simd" onclick="changeMode('simd')" class="px-6 py-2 rounded-lg font-bold text-sm transition-all text-slate-500 hover:bg-slate-50">SIMD</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="prevStep()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg font-bold text-sm hover:bg-slate-50 disabled:opacity-30" id="prev-btn">Back</button>
                    <button onclick="nextStep()" class="px-6 py-2 bg-slate-800 text-white rounded-lg font-bold text-sm hover:bg-slate-700 disabled:opacity-30" id="next-btn">Next Step</button>
                    <button onclick="reset()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg font-bold text-sm hover:bg-slate-50">Reset</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Stage -->
            <div class="lg:col-span-8 bg-white rounded-3xl shadow-xl border border-slate-100 p-8 flex flex-col items-center min-h-[550px]">
                <div class="mb-4 text-center">
                    <span id="step-counter" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Step 0 / 32</span>
                    <h2 id="current-action" class="text-xl font-bold text-slate-800">Ready to start</h2>
                </div>

                <svg id="viz-svg" width="600" height="480" viewBox="0 0 600 480" class="w-full h-auto">
                    <!-- Labels -->
                    <text x="300" y="20" text-anchor="middle" class="text-[10px] font-bold fill-slate-300 uppercase">Input RAM</text>
                    <text x="300" y="470" text-anchor="middle" class="text-[10px] font-bold fill-slate-300 uppercase">Output RAM</text>

                    <!-- RAM Rows -->
                    <g id="ram-top-group"></g>
                    <g id="ram-bottom-group"></g>

                    <!-- Registers -->
                    <g id="registers-group"></g>

                    <!-- Pipeline Phase Labels -->
                    <g id="phase-labels" class="fill-slate-300 text-[10px] font-bold italic" transform="translate(450, 0)">
                        <text y="105">LOAD</text>
                        <text y="185">ADD 5</text>
                        <text y="265">MUL 2</text>
                        <text y="345">STORE</text>
                    </g>

                    <!-- Moving Data Particles -->
                    <g id="data-particles-group"></g>
                </svg>
            </div>

            <!-- Right: Logic -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-xl min-h-[220px]">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-blue-400 mb-4">Current Instruction</h3>
                    <div id="code-display" class="font-mono text-sm text-blue-100 p-3 bg-slate-800 rounded-lg border border-slate-700 min-h-[80px] flex items-center">
                        // Select a mode to begin
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Pipeline Status</h3>
                    <div id="status-desc" class="text-sm text-slate-600 leading-relaxed">
                        In this visualization, one "Step" moves the data to the next stage of the pipeline.
                    </div>
                    <div class="mt-6 pt-6 border-t border-slate-100">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                            <span class="text-xs font-bold">Scalar Data</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                            <span class="text-xs font-bold">Vector Data Batch</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ramData = [1, 2, 3, 4, 5, 6, 7, 8];
        let mode = 'scalar';
        let currentStep = 0;

        // Constants for layout
        const ramXStart = 80;
        const ramGap = 55;
        const puX = 300;
        const stagesY = [100, 180, 260, 340];
        const topRamY = 35;
        const bottomRamY = 415;

        function initUI() {
            const ramTop = document.getElementById('ram-top-group');
            const ramBottom = document.getElementById('ram-bottom-group');
            const regs = document.getElementById('registers-group');
            
            ramTop.innerHTML = '';
            ramBottom.innerHTML = '';
            regs.innerHTML = '';

            // Draw RAM
            ramData.forEach((num, i) => {
                const x = ramXStart + (i * ramGap);
                const drawSlot = (g, y, idPrefix) => {
                    g.innerHTML += `
                        <rect id="${idPrefix}-${i}" x="${x}" y="${y}" width="45" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" class="transition-all duration-300" />
                        <text x="${x+22.5}" y="${y+22}" text-anchor="middle" class="text-[10px] font-bold fill-slate-400 pointer-events-none">M${num}</text>
                    `;
                };
                drawSlot(ramTop, topRamY, 't-ram');
                drawSlot(ramBottom, bottomRamY, 'b-ram');
            });

            // Draw Registers based on mode
            if (mode === 'scalar') {
                stagesY.forEach((y, i) => {
                    regs.innerHTML += `
                        <rect id="reg-${i}" x="${puX - 35}" y="${y - 25}" width="70" height="50" rx="8" fill="white" stroke="#cbd5e1" stroke-width="2" class="transition-all duration-300" />
                        <text x="${puX}" y="${y + 5}" text-anchor="middle" class="text-[10px] font-black fill-slate-700 uppercase">R${i+1}</text>
                    `;
                });
            } else {
                stagesY.forEach((y, i) => {
                    regs.innerHTML += `
                        <rect id="reg-${i}" x="${puX - 110}" y="${y - 25}" width="220" height="50" rx="8" fill="white" stroke="#cbd5e1" stroke-width="2" class="transition-all duration-300" />
                        <text x="${puX}" y="${y + 5}" text-anchor="middle" class="text-[10px] font-black fill-slate-700 uppercase tracking-tighter">Vector Register V${i+1}</text>
                        <line x1="${puX - 55}" y1="${y-25}" x2="${puX - 55}" y2="${y+25}" stroke="#f1f5f9" />
                        <line x1="${puX}" y1="${y-25}" x2="${puX}" y2="${y+25}" stroke="#f1f5f9" />
                        <line x1="${puX + 55}" y1="${y-25}" x2="${puX + 55}" y2="${y+25}" stroke="#f1f5f9" />
                    `;
                });
            }

            updateStepUI();
        }

        function changeMode(newMode) {
            mode = newMode;
            currentStep = 0;
            document.getElementById('btn-scalar').classList.toggle('active-btn', mode === 'scalar');
            document.getElementById('btn-simd').classList.toggle('active-btn', mode === 'simd');
            initUI();
        }

        function nextStep() {
            const max = mode === 'scalar' ? 32 : 8; 
            if (currentStep < max) {
                currentStep++;
                updateStepUI();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                updateStepUI();
            }
        }

        function reset() {
            currentStep = 0;
            updateStepUI();
        }

        function updateStepUI() {
            const particles = document.getElementById('data-particles-group');
            const actionText = document.getElementById('current-action');
            const counter = document.getElementById('step-counter');
            const codeDisp = document.getElementById('code-display');
            const statusDesc = document.getElementById('status-desc');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const color = mode === 'scalar' ? '#3b82f6' : '#6366f1';

            // Reset highlights
            document.querySelectorAll('rect').forEach(r => r.classList.remove('reg-active', 'ram-active'));

            const maxSteps = mode === 'scalar' ? 32 : 8;
            prevBtn.disabled = (currentStep === 0);
            nextBtn.disabled = (currentStep === maxSteps);

            if (currentStep === 0) {
                particles.innerHTML = '';
                actionText.innerText = 'System Idle';
                counter.innerText = mode === 'scalar' ? 'Step 0 / 32' : 'Step 0 / 8';
                codeDisp.innerText = '// Ready to execute';
                return;
            }

            // Logic calculation
            let itemIndex, stageIndex;
            if (mode === 'scalar') {
                itemIndex = Math.floor((currentStep - 1) / 4);
                stageIndex = (currentStep - 1) % 4;
                counter.innerText = `Step ${currentStep} / 32`;
            } else {
                itemIndex = Math.floor((currentStep - 1) / 4) * 4;
                stageIndex = (currentStep - 1) % 4;
                counter.innerText = `Step ${currentStep} / 8 (Batch Processing)`;
            }

            // Highlight Logic
            if (stageIndex === 0) {
                // LOAD stage
                if (mode === 'scalar') {
                    document.getElementById(`t-ram-${itemIndex}`).classList.add('ram-active');
                    actionText.innerText = `Fetch M${itemIndex + 1} from RAM`;
                    codeDisp.innerHTML = `LOAD R1, [M${itemIndex + 1}]`;
                } else {
                    for(let k=0; k<4; k++) document.getElementById(`t-ram-${itemIndex + k}`).classList.add('ram-active');
                    actionText.innerText = `Vector Fetch M${itemIndex+1} through M${itemIndex+4}`;
                    codeDisp.innerHTML = `VLOAD V1, [M${itemIndex+1}...M${itemIndex+4}]`;
                }
                document.getElementById('reg-0').classList.add('reg-active');
            } else if (stageIndex === 1) {
                actionText.innerText = `Applying addition (ADD 5)`;
                codeDisp.innerHTML = mode === 'scalar' ? `ADD R2, R1, 5` : `VADD V2, V1, 5`;
                document.getElementById('reg-1').classList.add('reg-active');
            } else if (stageIndex === 2) {
                actionText.innerText = `Applying multiplication (MUL 2)`;
                codeDisp.innerHTML = mode === 'scalar' ? `MUL R3, R2, 2` : `VMUL V3, V2, 2`;
                document.getElementById('reg-2').classList.add('reg-active');
            } else if (stageIndex === 3) {
                if (mode === 'scalar') {
                    document.getElementById(`b-ram-${itemIndex}`).classList.add('ram-active');
                    actionText.innerText = `Store Result to M${itemIndex + 1}`;
                    codeDisp.innerHTML = `STORE [M${itemIndex+1}], R3`;
                } else {
                    for(let k=0; k<4; k++) document.getElementById(`b-ram-${itemIndex + k}`).classList.add('ram-active');
                    actionText.innerText = `Vector Store Results to M${itemIndex+1}-M${itemIndex+4}`;
                    codeDisp.innerHTML = `VSTORE [M${itemIndex+1}...M${itemIndex+4}], V3`;
                }
                document.getElementById('reg-3').classList.add('reg-active');
            }

            // Draw Particles
            particles.innerHTML = '';
            const count = mode === 'scalar' ? 1 : 4;
            const laneWidth = 55;
            for(let i=0; i<count; i++) {
                const ramX = ramXStart + ((itemIndex + i) * ramGap) + 22.5;
                const regX = mode === 'scalar' ? puX : (puX - (1.5 * laneWidth) + (i * laneWidth));
                
                let posX, posY;
                if (stageIndex === 0) { posX = regX; posY = stagesY[0]; }
                else if (stageIndex === 1) { posX = regX; posY = stagesY[1]; }
                else if (stageIndex === 2) { posX = regX; posY = stagesY[2]; }
                else if (stageIndex === 3) { posX = ramX; posY = bottomRamY + 17; }

                particles.innerHTML += `
                    <g class="data-element" style="transform: translate(${posX}px, ${posY}px)">
                        <circle r="10" fill="${color}" stroke="white" stroke-width="2" />
                        <text dy=".35em" text-anchor="middle" fill="white" style="font-size: 8px; font-weight: bold;">D</text>
                    </g>
                `;
            }

            // Update description
            if (mode === 'scalar') {
                statusDesc.innerText = `Processing element M${itemIndex + 1}. Note that to finish the whole array, the CPU must repeat these 4 stages for every single element sequentially.`;
            } else {
                statusDesc.innerText = `Batch ${itemIndex === 0 ? '1' : '2'} (4 elements). SIMD handles all 4 data points with a single instruction, effectively finishing the work in 1/4th the steps.`;
            }
        }

        window.onload = initUI;
    </script>
</body>
</html>
