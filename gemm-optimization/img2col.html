<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to Column (im2col) Operation</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Inline Icons to replace lucide-react for standalone usage
    const Play = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    );
    const Pause = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
    );
    const ChevronLeft = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    );
    const ChevronRight = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    );

    const App = () => {
      const [currentPatch, setCurrentPatch] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);

      // Auto-play logic
      useEffect(() => {
        let interval;
        if (isPlaying) {
          interval = setInterval(() => {
            setCurrentPatch((prev) => (prev + 1) % 9);
          }, 1500); // Slightly slower for better readability
        }
        return () => clearInterval(interval);
      }, [isPlaying]);

      // Generate input data (4x4x3)
      const R = Array.from({ length: 16 }, (_, i) => i + 1);
      const G = Array.from({ length: 16 }, (_, i) => i + 17);
      const B = Array.from({ length: 16 }, (_, i) => i + 33);

      // Helper to get 4x4 indices for a given sliding window patch (0-8)
      const getPatchIndices = (patchIdx) => {
        const x = patchIdx % 3;
        const y = Math.floor(patchIdx / 3);
        return [y * 4 + x, y * 4 + x + 1, (y + 1) * 4 + x, (y + 1) * 4 + x + 1];
      };

      // Generate im2col matrix (12x9)
      const im2colData = [];
      for (let r = 0; r < 12; r++) {
        const row = [];
        for (let c = 0; c < 9; c++) {
          const patchIndices = getPatchIndices(c);
          const elemIdx = r % 4; // which element in the 2x2 patch
          if (r < 4) row.push(R[patchIndices[elemIdx]]);
          else if (r < 8) row.push(G[patchIndices[elemIdx]]);
          else row.push(B[patchIndices[elemIdx]]);
        }
        im2colData.push(row);
      }

      const currentPatchIndices = getPatchIndices(currentPatch);

      // Colors
      const redColor = "bg-red-500 text-white";
      const greenColor = "bg-green-500 text-white";
      const blueColor = "bg-blue-500 text-white";
      const mutedRed = "bg-red-200 text-red-800";
      const mutedGreen = "bg-green-200 text-green-800";
      const mutedBlue = "bg-blue-200 text-blue-800";

      // Reusable 4x4 grid component for channels
      const ChannelGrid = ({ data, activeColor, mutedColor, title }) => (
        <div className="flex flex-col items-center">
          <span className="text-xs font-bold mb-1">{title}</span>
          <div className="grid grid-cols-4 gap-[2px] bg-gray-800 p-[2px]">
            {data.map((val, i) => {
              const isHighlighted = currentPatchIndices.includes(i);
              return (
                <div
                  key={i}
                  className={`w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center text-xs sm:text-sm font-semibold transition-all duration-300 ${isHighlighted ? `${activeColor} ring-4 ring-yellow-400 z-10 scale-110 shadow-lg` : mutedColor
                    }`}
                >
                  {val}
                </div>
              );
            })}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-50 p-4 sm:p-8 font-sans text-gray-800 flex flex-col items-center overflow-x-hidden">

          {/* Header Section */}
          <div className="max-w-6xl w-full mb-8">
            <h1 className="text-2xl sm:text-3xl font-bold mb-2">Image to Column (im2col) Operation</h1>
            <p className="text-gray-600 mb-6 text-sm sm:text-base">
              Slide the input image like a convolution but each 2x2 patch becomes a column vector.
              This turns convolution into a simple matrix multiplication.
            </p>

            {/* Controls */}
            <div className="flex flex-wrap items-center gap-4 sm:gap-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
              <button
                onClick={() => setIsPlaying(!isPlaying)}
                className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors w-full sm:w-auto justify-center"
              >
                {isPlaying ? <Pause /> : <Play />}
                {isPlaying ? 'Pause' : 'Auto Play'}
              </button>

              <div className="flex items-center gap-2 sm:gap-4 flex-1 min-w-[200px]">
                <button
                  onClick={() => setCurrentPatch(p => (p > 0 ? p - 1 : 8))}
                  className="p-2 hover:bg-gray-100 rounded-full"
                >
                  <ChevronLeft />
                </button>
                <input
                  type="range"
                  min="0"
                  max="8"
                  value={currentPatch}
                  onChange={(e) => {
                    setCurrentPatch(parseInt(e.target.value));
                    setIsPlaying(false);
                  }}
                  className="w-full cursor-pointer accent-blue-600"
                />
                <button
                  onClick={() => setCurrentPatch(p => (p < 8 ? p + 1 : 0))}
                  className="p-2 hover:bg-gray-100 rounded-full"
                >
                  <ChevronRight />
                </button>
              </div>
              <div className="text-sm font-semibold w-full sm:w-24 text-center sm:text-right">
                Patch {currentPatch + 1} / 9
              </div>
            </div>
          </div>

          {/* Main Visualization Grid */}
          <div className="max-w-6xl w-full flex flex-col lg:flex-row gap-8 lg:gap-12 pb-8">

            {/* Left Column: Input Image & Params */}
            <div className="flex flex-col gap-6 lg:w-fit w-full">
              <div className="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200 overflow-x-auto">
                <h3 className="font-bold mb-4 text-center">Input Image [4x4x3]</h3>
                <div className="flex flex-wrap justify-center gap-4 mb-4">
                  <ChannelGrid data={R} activeColor={redColor} mutedColor={mutedRed} title="Red" />
                  <ChannelGrid data={G} activeColor={greenColor} mutedColor={mutedGreen} title="Green" />
                  <ChannelGrid data={B} activeColor={blueColor} mutedColor={mutedBlue} title="Blue" />
                </div>

                <div className="text-xs sm:text-sm space-y-1 bg-gray-50 p-4 rounded border font-mono mt-6">
                  <p>Kernel Size: 2x2</p>
                  <p>Stride: 1, Padding: 0</p>
                  <hr className="my-2 border-gray-300" />
                  <p>W_out = (4 - 2)/1 + 1 = 3</p>
                  <p>H_out = (4 - 2)/1 + 1 = 3</p>
                  <p>Patches = 3 x 3 = 9</p>
                </div>
              </div>
            </div>

            {/* Right Column: Im2Col Result */}
            <div className="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200 flex flex-col items-center flex-1 overflow-x-auto">
              <div className="flex flex-wrap items-center justify-center gap-4 sm:gap-8 mb-4">
                <div className="flex items-center gap-2 text-blue-600 font-bold text-lg sm:text-xl">
                  <span>im2col</span>
                  <svg width="40" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7" /></svg>
                </div>
                <h3 className="font-bold text-center">Result Matrix [12x9]</h3>
              </div>

              <div className="flex overflow-x-auto max-w-full pb-2">
                {/* Row indicators */}
                <div className="flex flex-col justify-between py-[2px] pr-2 text-[10px] text-gray-500 font-mono">
                  <div className="h-[120px] sm:h-[136px] flex items-center justify-end">Red<br />(4)</div>
                  <div className="h-[120px] sm:h-[136px] flex items-center justify-end">Green<br />(4)</div>
                  <div className="h-[120px] sm:h-[136px] flex items-center justify-end">Blue<br />(4)</div>
                </div>

                {/* Matrix */}
                <div className="grid grid-cols-9 gap-[2px] bg-gray-800 p-[2px] rounded-sm shrink-0">
                  {im2colData.map((row, r) =>
                    row.map((val, c) => {
                      const isHighlightedColumn = c === currentPatch;
                      let colorClass = r < 4 ? mutedRed : r < 8 ? mutedGreen : mutedBlue;
                      if (isHighlightedColumn) {
                        colorClass = r < 4 ? redColor : r < 8 ? greenColor : blueColor;
                      }

                      return (
                        <div
                          key={`${r}-${c}`}
                          className={`w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-xs sm:text-sm font-medium transition-all duration-300
                                ${colorClass}
                                ${isHighlightedColumn ? 'ring-2 ring-yellow-400 z-10 scale-105 shadow-md font-bold' : 'opacity-70'}
                              `}
                        >
                          {val}
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Bottom Section: Multiplication & Output */}
          <div className="max-w-6xl w-full bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200 mt-2">
            <h3 className="font-bold mb-6 text-center">Matrix Multiplication & col2im Reshape</h3>

            {/* Changed to flex-wrap to prevent overflow issues on narrower screens */}
            <div className="flex flex-wrap items-center justify-center gap-6 sm:gap-8">

              {/* Kernel */}
              <div className="flex flex-col items-center">
                <span className="text-[10px] sm:text-xs font-bold mb-2">Kernel [1x12]</span>
                <div className="flex gap-[2px] bg-gray-800 p-[2px] rounded-sm opacity-80 flex-wrap max-w-[190px] sm:max-w-none justify-center">
                  {Array.from({ length: 4 }).map((_, i) => <div key={`k-r-${i}`} className="w-5 h-5 sm:w-6 sm:h-6 bg-red-400 border border-red-500"></div>)}
                  {Array.from({ length: 4 }).map((_, i) => <div key={`k-g-${i}`} className="w-5 h-5 sm:w-6 sm:h-6 bg-green-400 border border-green-500"></div>)}
                  {Array.from({ length: 4 }).map((_, i) => <div key={`k-b-${i}`} className="w-5 h-5 sm:w-6 sm:h-6 bg-blue-400 border border-blue-500"></div>)}
                </div>
              </div>

              <div className="font-bold text-lg sm:text-xl hidden md:block">X</div>

              {/* Active Column Representation */}
              <div className="flex flex-col items-center">
                <span className="text-[10px] sm:text-xs font-bold mb-2">Col {currentPatch + 1} [12x1]</span>
                <div className="flex gap-[2px] bg-yellow-400 p-[4px] rounded-sm flex-wrap max-w-[190px] sm:max-w-none justify-center">
                  {Array.from({ length: 12 }).map((_, i) => (
                    <div key={`c-${i}`} className={`w-5 h-5 sm:w-6 sm:h-6 text-[9px] sm:text-[10px] flex items-center justify-center font-bold
                            ${i < 4 ? redColor : i < 8 ? greenColor : blueColor}
                          `}>
                      {im2colData[i][currentPatch]}
                    </div>
                  ))}
                </div>
              </div>

              <div className="font-bold text-lg sm:text-xl w-full text-center md:w-auto">=</div>

              {/* Result Row */}
              <div className="flex flex-col items-center">
                <span className="text-[10px] sm:text-xs font-bold mb-2">Result Vector [1x9]</span>
                <div className="flex gap-[2px] bg-gray-800 p-[2px] rounded-sm flex-wrap max-w-[150px] sm:max-w-none justify-center">
                  {Array.from({ length: 9 }).map((_, i) => (
                    <div key={`res-${i}`} className={`w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-[10px] sm:text-xs font-bold transition-all
                            ${i === currentPatch ? 'bg-cyan-500 text-white ring-2 ring-yellow-400 scale-110 z-10' : 'bg-cyan-100 text-cyan-800'}
                         `}>
                      P{i + 1}
                    </div>
                  ))}
                </div>
              </div>

              <div className="flex flex-col items-center px-2 sm:px-4 w-full text-center md:w-auto">
                <span className="text-[10px] sm:text-xs font-bold mb-1 sm:mb-2">col2im</span>
                <svg width="30" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-500 mx-auto sm:w-[40px]"><path d="M5 12h14M12 5l7 7-7 7" /></svg>
              </div>

              {/* Final 3x3 Output */}
              <div className="flex flex-col items-center">
                <span className="text-[10px] sm:text-xs font-bold mb-2">Conv Out [3x3]</span>
                <div className="grid grid-cols-3 gap-[2px] bg-gray-800 p-[2px] rounded-sm">
                  {Array.from({ length: 9 }).map((_, i) => (
                    <div key={`out-${i}`} className={`w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-[10px] sm:text-xs font-bold transition-all
                            ${i === currentPatch ? 'bg-cyan-500 text-white ring-4 ring-yellow-400 scale-110 z-10 shadow-lg' : 'bg-cyan-100 text-cyan-800'}
                         `}>
                      P{i + 1}
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
