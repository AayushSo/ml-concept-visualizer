<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systolic Array Pipeline Visualization</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const GRID_SIZE = 3;
        const PE_SIZE = 60;
        const SPACING = 100;
        const START_X = 400; 
        const START_Y = 250; 
        const MAX_STEPS = 18; // Extended for pipelining two matrices and draining

        // Shared color map representing spatial matrix locations
        const PE_COLORS = [
            [
                { bgClass: 'bg-red-200', textClass: 'text-red-900', svgBg: '#fecaca', svgStroke: '#ef4444', svgText: '#7f1d1d' },
                { bgClass: 'bg-orange-200', textClass: 'text-orange-900', svgBg: '#fed7aa', svgStroke: '#f97316', svgText: '#7c2d12' },
                { bgClass: 'bg-green-200', textClass: 'text-green-900', svgBg: '#bbf7d0', svgStroke: '#22c55e', svgText: '#14532d' }
            ],
            [
                { bgClass: 'bg-teal-200', textClass: 'text-teal-900', svgBg: '#99f6e4', svgStroke: '#14b8a6', svgText: '#134e4a' },
                { bgClass: 'bg-blue-200', textClass: 'text-blue-900', svgBg: '#bfdbfe', svgStroke: '#3b82f6', svgText: '#1e3a8a' },
                { bgClass: 'bg-indigo-200', textClass: 'text-indigo-900', svgBg: '#c7d2fe', svgStroke: '#6366f1', svgText: '#312e81' }
            ],
            [
                { bgClass: 'bg-purple-200', textClass: 'text-purple-900', svgBg: '#e9d5ff', svgStroke: '#a855f7', svgText: '#581c87' },
                { bgClass: 'bg-pink-200', textClass: 'text-pink-900', svgBg: '#fbcfe8', svgStroke: '#ec4899', svgText: '#831843' },
                { bgClass: 'bg-rose-200', textClass: 'text-rose-900', svgBg: '#fecdd3', svgStroke: '#f43f5e', svgText: '#881337' }
            ]
        ];

        const SystolicArray = () => {
            const [step, setStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [mode, setMode] = useState('WS'); // Default to WS as it's the AI standard
            const timerRef = useRef(null);

            const nextStep = useCallback(() => setStep(s => Math.min(s + 1, MAX_STEPS)), []);
            const prevStep = useCallback(() => setStep(s => Math.max(s - 1, 0)), []);
            const reset = useCallback(() => { setStep(0); setIsPlaying(false); }, []);
            const togglePlay = useCallback(() => setIsPlaying(p => !p), []);

            useEffect(() => {
                if (isPlaying) {
                    timerRef.current = setInterval(() => {
                        setStep(s => {
                            if (s >= MAX_STEPS) { setIsPlaying(false); return s; }
                            return s + 1;
                        });
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isPlaying]);

            const switchMode = (newMode) => {
                setMode(newMode);
                reset();
            };

            // Calculate active state supporting pipelining (2 batches)
            const getPEState = (row, col, currentStep) => {
                if (mode === 'OS') {
                    const i = row, j = col;
                    // Check if computing any batch
                    for (let b = 0; b < 2; b++) {
                        const k = currentStep - 1 - i - j - b * 3;
                        if (k >= 0 && k < GRID_SIZE) return { active: true, i, j, k, b, status: 'computing' };
                    }
                    // Determine if holding a finished sum before drain starts
                    if (currentStep - 1 - i - j - 3 === GRID_SIZE) return { active: false, i, j, k: 2, b: 1, status: 'done' };
                    if (currentStep - 1 - i - j === GRID_SIZE) return { active: false, i, j, k: 2, b: 0, status: 'done' };
                    return { active: false, i, j, b: 0, status: 'waiting' };
                } else { // WS Mode
                    const k = row, j = col;
                    for (let b = 0; b < 2; b++) {
                        const i = currentStep - 1 - k - j - b * 3;
                        if (i >= 0 && i < GRID_SIZE) return { active: true, i, j, k, b, status: 'computing' };
                    }
                    return { active: false, i: 0, j, k, b: 0, status: 'waiting' };
                }
            };

            // Coordinate mappings
            const getAPos = (i, k, s) => mode === 'OS' 
                ? { x: START_X + (s - 1 - i - k) * SPACING, y: START_Y + i * SPACING }
                : { x: START_X + (s - 1 - i - k) * SPACING, y: START_Y + k * SPACING };
                
            const getBPos = (k, j, s) => ({
                x: START_X + j * SPACING,
                y: START_Y + (s - 1 - k - j) * SPACING
            });

            const getCPos = (i, j, s) => ({
                x: START_X + j * SPACING,
                y: START_Y + (s - 1 - i - j) * SPACING
            });

            const getParallelogram = (getPosFn, stepOffset) => {
                const padX = 35, padY = 25;
                const tr = getPosFn(0, 0, stepOffset);
                const tl = getPosFn(mode === 'OS' ? 0 : 2, mode === 'OS' ? 2 : 0, stepOffset);
                const bl = getPosFn(2, 2, stepOffset);
                const br = getPosFn(mode === 'OS' ? 2 : 0, mode === 'OS' ? 0 : 2, stepOffset);
                return `${tr.x+padX},${tr.y-padY} ${tl.x-padX},${tl.y-padY} ${bl.x-padX},${bl.y+padY} ${br.x+padX},${br.y+padY}`;
            };
            
            // Switch equation focus dynamically as the second matrix flows in
            const displayBatch = step < 7 ? 0 : 1;
            const resName = displayBatch === 0 ? 'C' : 'Z';
            const inName = displayBatch === 0 ? 'a' : 'x';

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-white text-gray-800 font-sans">
                    {/* Header */}
                    <div className="flex justify-between items-center p-6 border-b border-gray-200 bg-white z-10 shadow-sm">
                        <div>
                            <h1 className="text-3xl font-light text-gray-900 tracking-tight">
                                Matrix Multiplication <span className="text-gray-400">Pipeline</span>
                            </h1>
                            <p className="text-sm text-gray-500 mt-1">Demonstrating 100% utilization by streaming inputs consecutively.</p>
                        </div>
                        <div className="flex items-center space-x-6">
                            {/* Architecture Toggle */}
                            <div className="flex items-center space-x-1 bg-gray-100 p-1 rounded-xl border border-gray-200">
                                <button 
                                    onClick={() => switchMode('OS')} 
                                    className={`px-4 py-2 text-sm font-medium rounded-lg transition-all ${mode === 'OS' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    Output Stationary
                                </button>
                                <button 
                                    onClick={() => switchMode('WS')} 
                                    className={`px-4 py-2 text-sm font-medium rounded-lg transition-all ${mode === 'WS' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    Weight Stationary
                                </button>
                            </div>

                            {/* Playback Controls */}
                            <div className="flex items-center space-x-3 bg-gray-100 p-2 rounded-xl">
                                <button onClick={reset} className="p-2 hover:bg-gray-200 rounded-lg transition-colors" title="Reset">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                </button>
                                <button onClick={prevStep} disabled={step === 0} className="p-2 hover:bg-gray-200 rounded-lg disabled:opacity-50 transition-colors" title="Step Backward">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                </button>
                                <button onClick={togglePlay} className="flex items-center justify-center w-12 h-12 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md transition-transform active:scale-95">
                                    {isPlaying ? (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                    ) : (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className="ml-1"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                    )}
                                </button>
                                <button onClick={nextStep} disabled={step === MAX_STEPS} className="p-2 hover:bg-gray-200 rounded-lg disabled:opacity-50 transition-colors" title="Step Forward">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                </button>
                                <div className="font-mono text-sm px-3 font-medium bg-white py-1 rounded shadow-sm border border-gray-200">
                                    t = {step}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col flex-1 overflow-hidden relative">
                        {/* Matrix Output Area (Top) */}
                        <div className="w-full bg-gray-50 border-b border-gray-200 p-6 flex items-center justify-center z-10 shadow-sm overflow-x-auto min-h-[160px] transition-colors duration-500">
                            <div className="flex items-center">
                                <div className="flex flex-col items-end mr-4">
                                    <span className="text-2xl font-semibold italic font-serif text-gray-800 transition-all">{resName} = </span>
                                    <span className="text-xs text-gray-500 font-mono mt-1 transition-all">{displayBatch === 0 ? 'Batch 1' : 'Batch 2'}</span>
                                </div>
                                <div className="relative border-l-[3px] border-r-[3px] border-gray-800 px-6 py-3 flex flex-col gap-4">
                                    <div className="absolute top-0 left-0 w-3 h-[3px] bg-gray-800"></div>
                                    <div className="absolute bottom-0 left-0 w-3 h-[3px] bg-gray-800"></div>
                                    <div className="absolute top-0 right-0 w-3 h-[3px] bg-gray-800"></div>
                                    <div className="absolute bottom-0 right-0 w-3 h-[3px] bg-gray-800"></div>
                                    
                                    {[0, 1, 2].map(i => (
                                        <div key={`row-${i}`} className="flex gap-8">
                                            {[0, 1, 2].map(j => (
                                                <div key={`eq-${i}-${j}`} className="font-mono text-[15px] flex items-center justify-center min-w-[180px]">
                                                    {[0, 1, 2].map(k => {
                                                        const termStep = i + j + k + 1 + displayBatch * 3;
                                                        const isComputed = step >= termStep;
                                                        const isComputing = step === termStep;
                                                        const colorTheme = PE_COLORS[i][j];
                                                        
                                                        return (
                                                            <React.Fragment key={`term-${k}`}>
                                                                <span 
                                                                    className={`transition-all duration-300 px-1 py-0.5 rounded inline-block
                                                                        ${isComputing ? `${colorTheme.bgClass} ${colorTheme.textClass} font-bold scale-110 z-10` : 
                                                                          isComputed ? 'text-gray-900 z-0' : 'text-gray-300 z-0'}`}
                                                                >
                                                                    {inName}<sub>{i}{k}</sub>b<sub>{k}{j}</sub>
                                                                </span>
                                                                {k < 2 && <span className={`mx-1.5 ${isComputed || isComputing ? 'text-gray-400' : 'text-gray-200'}`}>+</span>}
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Visualization Area */}
                        <div className="flex-1 bg-white relative overflow-hidden">
                            <svg className="w-full h-full" viewBox="-100 0 1100 700" preserveAspectRatio="xMidYMid meet">
                                <defs>
                                    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af" />
                                    </marker>
                                </defs>

                                {/* Base Wires */}
                                {[0, 1, 2].map(row => (
                                    <g key={`wires-${row}`}>
                                        <line x1={START_X - 1.5*SPACING} y1={START_Y + row*SPACING} x2={START_X + 2.5*SPACING} y2={START_Y + row*SPACING} stroke="#e5e7eb" strokeWidth="2" markerEnd="url(#arrow)" />
                                        <line x1={START_X + row*SPACING} y1={START_Y - 1.5*SPACING} x2={START_X + row*SPACING} y2={START_Y + 3.5*SPACING} stroke="#e5e7eb" strokeWidth="2" markerEnd="url(#arrow)" />
                                    </g>
                                ))}

                                {/* Parallelograms (Mapping 2 Batches) */}
                                {[0, 1].map(b => {
                                    const s = step - b * 3;
                                    const aPoints = getParallelogram(getAPos, s);
                                    const aColor = b === 0 ? '#ef4444' : '#10b981'; // Red or Emerald

                                    // Hide if out of bounds
                                    if (s > 10 || s < -4) return null;

                                    return (
                                        <g key={`poly-a-${b}`}>
                                            <polygon points={aPoints} fill="none" stroke={aColor} strokeWidth="1.5" strokeDasharray="4 4" className="transition-all duration-500 ease-linear" />
                                        </g>
                                    );
                                })}

                                {mode === 'OS' && [0, 1].map(b => {
                                    const s = step - b * 3;
                                    if (s > 10 || s < -4) return null;
                                    const bPoints = getParallelogram((k,j,st) => getBPos(mode==='OS'?k:j, mode==='OS'?j:k, st), s);
                                    return (
                                        <g key={`poly-b-${b}`}>
                                            <polygon points={bPoints} fill="none" stroke="#3b82f6" strokeWidth="1.5" strokeDasharray="4 4" className="transition-all duration-500 ease-linear" />
                                        </g>
                                    );
                                })}

                                {mode === 'WS' && [0, 1].map(b => {
                                    const s = step - b * 3;
                                    if (s > 10 || s < -4) return null;
                                    const cPoints = getParallelogram(getCPos, s);
                                    const cColor = b === 0 ? '#a855f7' : '#d946ef'; // Purple or Fuchsia
                                    return (
                                        <g key={`poly-c-${b}`}>
                                            <polygon points={cPoints} fill="none" stroke={cColor} strokeWidth="1.5" strokeDasharray="4 4" className="transition-all duration-500 ease-linear" />
                                        </g>
                                    );
                                })}

                                {/* Processing Elements (PEs) - Backgrounds Only */}
                                {[0, 1, 2].map(row => (
                                    [0, 1, 2].map(col => {
                                        const pos = { x: START_X + col * SPACING, y: START_Y + row * SPACING };
                                        const state = getPEState(row, col, step);
                                        
                                        let fill = 'white', stroke = '#cbd5e1', strokeWidth = "1";
                                        if (state.active) {
                                            const colorTheme = PE_COLORS[state.i][state.j];
                                            fill = colorTheme.svgBg;
                                            stroke = colorTheme.svgStroke;
                                            strokeWidth = "2";
                                        } else if (mode === 'WS') {
                                            fill = '#f8fafc'; 
                                            stroke = '#93c5fd'; 
                                        }
                                        
                                        return (
                                            <g key={`pe-bg-${row}-${col}`} transform={`translate(${pos.x}, ${pos.y})`}>
                                                <rect 
                                                    x={-PE_SIZE/2} y={-PE_SIZE/2} 
                                                    width={PE_SIZE} height={PE_SIZE} 
                                                    fill={fill} stroke={stroke} strokeWidth={strokeWidth}
                                                    rx="4" className="transition-colors duration-300"
                                                />
                                            </g>
                                        );
                                    })
                                ))}

                                {/* Data Stream A / X (flowing right) */}
                                {[0, 1].map(b => (
                                    [0, 1, 2].map(i => (
                                        [0, 1, 2].map(k => {
                                            const pos = getAPos(i, k, step - b * 3);
                                            if (pos.x > START_X + 3.5 * SPACING || pos.x < START_X - 4.5 * SPACING) return null;
                                            const label = b === 0 ? 'a' : 'x';
                                            const textColor = b === 0 ? 'fill-red-700' : 'fill-emerald-700';
                                            return (
                                                <g key={`a-${b}-${i}-${k}`} transform={`translate(${pos.x}, ${pos.y})`} className="transition-transform duration-500 ease-linear">
                                                    <rect x="-15" y="-12" width="30" height="24" fill="transparent" rx="4" />
                                                    <text className={`font-mono text-sm font-semibold ${textColor}`} textAnchor="middle" dominantBaseline="central" y="0">
                                                        {label}<tspan baselineShift="sub" fontSize="0.75em">{i}{k}</tspan>
                                                    </text>
                                                </g>
                                            );
                                        })
                                    ))
                                ))}

                                {/* Data Stream B (OS: flowing down, WS: None, it's stationary) */}
                                {mode === 'OS' && [0, 1].map(b => (
                                    [0, 1, 2].map(k => (
                                        [0, 1, 2].map(j => {
                                            const pos = getBPos(k, j, step - b * 3);
                                            if (pos.y > START_Y + 4.5 * SPACING || pos.y < START_Y - 4.5 * SPACING) return null;
                                            return (
                                                <g key={`b-${b}-${k}-${j}`} transform={`translate(${pos.x}, ${pos.y})`} className="transition-transform duration-500 ease-linear">
                                                    <rect x="-15" y="-12" width="30" height="24" fill="transparent" rx="4" />
                                                    <text className="font-mono text-sm font-semibold fill-blue-700" textAnchor="middle" dominantBaseline="central" y="0">
                                                        b<tspan baselineShift="sub" fontSize="0.75em">{k}{j}</tspan>
                                                    </text>
                                                </g>
                                            );
                                        })
                                    ))
                                ))}

                                {/* Data Stream C / Z (Flowing and Draining) */}
                                {[0, 1].map(b => (
                                    [0, 1, 2].map(i => (
                                        [0, 1, 2].map(j => {
                                            let pos = null;
                                            let showPacket = false;
                                            let isDoneText = false;
                                            const label = b === 0 ? 'C' : 'Z';

                                            if (mode === 'WS') {
                                                pos = getCPos(i, j, step - b * 3);
                                                showPacket = true;
                                            } else { // OS drain logic
                                                const finishStep = i + j + b * 3 + 3;
                                                if (step > finishStep) {
                                                    const drainOffset = (step - finishStep) * SPACING;
                                                    // OS Drains down a separate "bus" lane to avoid visual overlap
                                                    pos = { x: START_X + j * SPACING + 28, y: START_Y + i * SPACING + drainOffset };
                                                    showPacket = true;
                                                } else if (step === finishStep) {
                                                    pos = { x: START_X + j * SPACING, y: START_Y + i * SPACING };
                                                    isDoneText = true;
                                                }
                                            }

                                            if (!pos || pos.y > START_Y + 4.5 * SPACING || pos.y < START_Y - 2.5 * SPACING) return null;
                                            const colorTheme = PE_COLORS[i][j];

                                            return (
                                                <g key={`c-${b}-${i}-${j}`} transform={`translate(${pos.x}, ${pos.y})`} className="transition-transform duration-500 ease-linear fade-in">
                                                    {showPacket ? (
                                                        <React.Fragment>
                                                            <rect x="-18" y="-12" width="36" height="24" fill={colorTheme.svgBg} stroke={colorTheme.svgStroke} strokeWidth="1" rx="4" />
                                                            <text className="font-mono text-[13px] font-semibold" fill={colorTheme.svgText} textAnchor="middle" dominantBaseline="central" y="0">
                                                                {label}<tspan baselineShift="sub" fontSize="0.75em">{i}{j}</tspan>
                                                            </text>
                                                        </React.Fragment>
                                                    ) : isDoneText ? (
                                                        <text className="text-sm font-semibold fill-gray-500" textAnchor="middle" dominantBaseline="central" y="0">
                                                            {label}<tspan baselineShift="sub" fontSize="0.7em">{i}{j}</tspan>
                                                        </text>
                                                    ) : null}
                                                </g>
                                            );
                                        })
                                    ))
                                ))}

                                {/* Processing Elements (PEs) - Foregrounds (Text & Opaque Masks) */}
                                {[0, 1, 2].map(row => (
                                    [0, 1, 2].map(col => {
                                        const pos = { x: START_X + col * SPACING, y: START_Y + row * SPACING };
                                        const state = getPEState(row, col, step);
                                        
                                        return (
                                            <g key={`pe-fg-${row}-${col}`} transform={`translate(${pos.x}, ${pos.y})`}>
                                                {state.active ? (
                                                    <g className="fade-in">
                                                        <rect x="-28" y="-14" width="56" height="28" fill={PE_COLORS[state.i][state.j].svgBg} rx="2" />
                                                        <text className="text-[13px] font-mono font-bold" fill={PE_COLORS[state.i][state.j].svgText} textAnchor="middle" dominantBaseline="central" y="0">
                                                            {state.b === 0 ? 'a' : 'x'}<tspan baselineShift="sub" fontSize="0.7em">{state.i}{state.k}</tspan>
                                                            <tspan dx="2">b</tspan><tspan baselineShift="sub" fontSize="0.7em">{state.k}{state.j}</tspan>
                                                        </text>
                                                    </g>
                                                ) : (
                                                    mode === 'WS' && (
                                                        <text className="text-sm font-semibold fill-blue-800/60" textAnchor="middle" dominantBaseline="central" y="0">
                                                            b<tspan baselineShift="sub" fontSize="0.7em">{row}{col}</tspan>
                                                        </text>
                                                    )
                                                )}
                                            </g>
                                        );
                                    })
                                ))}

                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SystolicArray />);
    </script>
</body>
</html>
