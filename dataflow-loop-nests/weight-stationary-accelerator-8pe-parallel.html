<!doctype html>
<!-- Brief: Visualization of a generic accelerator with 8 processing elements in parallel. -->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generic Accelerator - 8 PE Parallel Visualization</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap");

    body {
      background-color: #f8fafc;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .code-font {
      font-family: "Fira Code", monospace;
    }

    .btn-control {
      @apply flex items-center justify-center rounded-lg transition-all active:scale-95 disabled:opacity-50 disabled:pointer-events-none;
    }

    .btn-nav {
      @apply w-10 h-10 bg-slate-100 text-slate-600 hover:bg-slate-200 hover:text-slate-900 border border-slate-200;
    }

    .btn-play {
      @apply w-12 h-12 bg-blue-600 text-white hover:bg-blue-700 shadow-md shadow-blue-200;
    }

    .btn-action {
      @apply px-4 h-10 bg-white text-slate-500 hover:text-rose-500 hover:bg-rose-50 border border-slate-200 text-xs font-bold uppercase tracking-wider;
    }
  </style>
</head>

<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-slate-800 mb-2">
        Generic Accelerator – 8 Processing Elements in Parallel
      </h1>
      <div id="focusSubtitle" class="text-xl text-blue-600 font-serif italic">
        Weight-Stationary Style Dataflow (Focus: Output 0)
      </div>
    </header>

    <div class="space-y-6">
      <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
        <canvas id="mainCanvas" class="w-full h-auto"></canvas>
        <div class="mt-1 pt-1 border-t border-slate-100">
          <h3 class="font-bold text-slate-400 text-[10px] uppercase tracking-[0.2em] mb-5 text-center">
            Execution Controller
          </h3>

          <div class="flex flex-col items-center gap-4">
          <div class="flex items-center gap-3">
            <button id="backBtn" class="btn-control btn-nav" title="Previous Step">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
              </svg>
            </button>

            <button id="playBtn" class="btn-control btn-play" title="Play / Pause">
              <span id="playIcon" class="text-xl ml-0.5">▶</span>
            </button>

            <button id="nextBtn" class="btn-control btn-nav" title="Next Step">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>

          <button id="resetBtn" class="btn-control btn-action">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
            Reset Sequence
          </button>

          <div class="flex items-center gap-2 mt-1">
            <button id="focusInput0Btn" class="px-3 h-9 rounded-lg border border-slate-300 text-xs font-bold tracking-wide bg-blue-600 text-white">
              Output 0
            </button>
            <button id="focusBothBtn" class="px-3 h-9 rounded-lg border border-slate-300 text-xs font-bold tracking-wide bg-white text-slate-600 hover:bg-slate-50">
              Output 0,1
            </button>
            <button id="focusAllBtn" class="px-3 h-9 rounded-lg border border-slate-300 text-xs font-bold tracking-wide bg-white text-slate-600 hover:bg-slate-50">
              All Outputs
            </button>
          </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("mainCanvas");
      const ctx = canvas.getContext("2d");

      const backBtn = document.getElementById("backBtn");
      const playBtn = document.getElementById("playBtn");
      const nextBtn = document.getElementById("nextBtn");
      const resetBtn = document.getElementById("resetBtn");
      const playIcon = document.getElementById("playIcon");
      const focusSubtitle = document.getElementById("focusSubtitle");
      const focusInput0Btn = document.getElementById("focusInput0Btn");
      const focusBothBtn = document.getElementById("focusBothBtn");
      const focusAllBtn = document.getElementById("focusAllBtn");

      const STEPS = 8;
      const PE_COUNT = 8;

      let step = 0;
      let isPlaying = false;
      let lastTime = 0;
      let drawScale = 1;
      let drawOffsetX = 0;
      let drawOffsetY = 12;
      let focusMode = "input0"; // input0 | both | all

      const DESIGN_WIDTH = 1250;
      const DESIGN_HEIGHT = 700;

      function updateFocusSubtitle() {
        const subtitleMap = {
          input0: "Weight-Stationary Style Dataflow (Focus: Output 0)",
          both: "Weight-Stationary Style Dataflow (Focus: Output 0,1)",
          all: "Weight-Stationary Style Dataflow (Focus: All Outputs)",
        };
        focusSubtitle.textContent = subtitleMap[focusMode] || subtitleMap.input0;
      }

      function updateFocusButtons() {
        const map = {
          input0: focusInput0Btn,
          both: focusBothBtn,
          all: focusAllBtn,
        };

        [focusInput0Btn, focusBothBtn, focusAllBtn].forEach((btn) => {
          btn.classList.remove("bg-blue-600", "text-white");
          btn.classList.add("bg-white", "text-slate-600");
        });

        const activeBtn = map[focusMode];
        activeBtn.classList.remove("bg-white", "text-slate-600");
        activeBtn.classList.add("bg-blue-600", "text-white");
        updateFocusSubtitle();
      }

      function resize() {
        const container = canvas.parentElement;
        const dpr = window.devicePixelRatio || 1;
        const cssWidth = container.clientWidth;

        drawScale = Math.min(1, (cssWidth - 16) / DESIGN_WIDTH);
        const cssHeight = Math.ceil(DESIGN_HEIGHT * drawScale + 24);
        drawOffsetX = (cssWidth - DESIGN_WIDTH * drawScale) / 2;

        canvas.width = Math.floor(cssWidth * dpr);
        canvas.height = Math.floor(cssHeight * dpr);
        canvas.style.width = cssWidth + "px";
        canvas.style.height = cssHeight + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }

      function roundedRect(x, y, w, h, r = 6) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
      }

      function drawTopRows(
        active,
        yBase = 24,
        outputIdx = 0,
        strokeColor = "#dc2626",
        titleBase = "Output",
        highlightInputFilter = true,
        inputShift = 0,
        filterShift = 0,
        filterRowOffsetCells = 0,
      ) {
        const startX = 460;
        const topY = yBase;
        const cellW = 34;
        const cellH = 28;
        const gap = 0;
        const inputActive = active + inputShift;
        const filterActive = active + filterShift;
        const clampedInputActive = Math.min(10, Math.max(0, inputActive));
        const clampedFilterActive = Math.min(7, Math.max(0, filterActive));
        const movingOutput = outputIdx;

        // Input row: 0..10
        for (let i = 0; i <= 10; i++) {
          const x = startX + i * (cellW + gap);
          ctx.fillStyle = "#b8c7db";
          ctx.strokeStyle = "#334155";
          ctx.lineWidth = 1;
          roundedRect(x, topY, cellW, cellH, 0);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#111827";
          ctx.font = "bold 15px monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(i), x + cellW / 2, topY + cellH / 2 + 1);
        }

        // Filter row: 0..7
        const filterY = topY + 42;
        for (let i = 0; i <= 7; i++) {
          const x = startX + (i + filterRowOffsetCells) * (cellW + gap);
          ctx.fillStyle = "#d5e6bf";
          ctx.strokeStyle = "#3f3f46";
          ctx.lineWidth = 1;
          roundedRect(x, filterY, cellW, cellH, 0);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#111827";
          ctx.font = "bold 15px monospace";
          ctx.fillText(String(i), x + cellW / 2, filterY + cellH / 2 + 1);
        }

        // Output row: 0..3
        const outputY = filterY + 54;
        for (let i = 0; i <= 3; i++) {
          const x = startX + i * (cellW + gap);
          ctx.fillStyle = "#e8c4c0";
          ctx.strokeStyle = "#3f3f46";
          ctx.lineWidth = 1;
          roundedRect(x, outputY, cellW, cellH, 0);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#111827";
          ctx.font = "bold 15px monospace";
          ctx.fillText(String(i), x + cellW / 2, outputY + cellH / 2 + 1);
        }

        // lane title
        ctx.fillStyle = "#111827";
        ctx.font = "500 20px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillText(`${titleBase} ${movingOutput}`, startX - 8, topY - 10);

        // Dashed highlights
        function dashedRect(x, y, w, h) {
          ctx.save();
          ctx.setLineDash([3, 3]);
          ctx.strokeStyle = strokeColor;
          ctx.lineWidth = 1.2;
          ctx.strokeRect(x - 5, y - 5, w + 10, h + 10);
          ctx.restore();
        }

        if (highlightInputFilter) {
          if (inputActive >= 0 && inputActive <= 10) {
            dashedRect(startX + clampedInputActive * cellW, topY, cellW, cellH);
          }
          if (filterActive >= 0 && filterActive <= 7) {
            dashedRect(startX + (clampedFilterActive + filterRowOffsetCells) * cellW, filterY, cellW, cellH);
          }
        }
        dashedRect(startX + movingOutput * cellW, outputY, cellW, cellH);
      }

      function drawArchitecture(active) {
        const baseY = 270;
        const peStartX = 80;
        const peW = 86;
        const peH = 78;
        const peGap = 20;

        // Global buffer bar
        const gbX = peStartX;
        const gbW = PE_COUNT * peW + (PE_COUNT - 1) * peGap;
        const gbY = baseY - 110;
        const gbH = 48;

        ctx.fillStyle = "#4b4b4d";
        roundedRect(gbX, gbY, gbW, gbH, 2);
        ctx.fill();

        ctx.fillStyle = "#e5e7eb";
        ctx.font = "bold 38px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Global Buffer", gbX + gbW / 2, gbY + 33);

        // Blue activation bus
        const busY = gbY + gbH + 62;
        ctx.strokeStyle = "#1d4ed8";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(peStartX + 10, busY);
        ctx.lineTo(peStartX + gbW - 10, busY);
        ctx.stroke();

        // Left and right psum vertical arrows
        function drawArrow(x1, y1, x2, y2, color, width = 6, headLen = 12) {
          ctx.save();
          ctx.strokeStyle = color;
          ctx.lineWidth = width;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          const angle = Math.atan2(y2 - y1, x2 - x1);
          ctx.beginPath();
          ctx.moveTo(x2, y2);
          ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
          ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        function drawRightArrow(x1, y, x2, color, width = 4, headLen = 8) {
          ctx.save();
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.lineWidth = width;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(x1, y);
          ctx.lineTo(x2 - headLen, y);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(x2, y);
          ctx.lineTo(x2 - headLen, y - headLen * 0.65);
          ctx.lineTo(x2 - headLen, y + headLen * 0.65);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        drawArrow(peStartX + 20, busY - 60, peStartX + 20, baseY - 14, "#ef4444", 6, 11);
        drawArrow(peStartX + gbW - 20, baseY - 12, peStartX + gbW - 20, busY - 70, "#ef4444", 6, 11);

        // labels
        ctx.fillStyle = "#ef4444";
        ctx.font = "bold 30px sans-serif";
        ctx.textAlign = "right";
        ctx.fillText("Psum", peStartX + 2, busY - 22);

        ctx.fillStyle = "#1d4ed8";
        ctx.textAlign = "left";
        ctx.fillText("Activation", peStartX + gbW - 180, busY - 44);

        // PEs
        const peTop = baseY;
        for (let i = 0; i < PE_COUNT; i++) {
          const x = peStartX + i * (peW + peGap);

          // PE body
          ctx.fillStyle = "#f3f4f6";
          ctx.strokeStyle = "#111827";
          ctx.lineWidth = 4;
          roundedRect(x, peTop, peW, peH, 0);
          ctx.fill();
          ctx.stroke();

          // simple MAC icon
          ctx.strokeStyle = "#111827";
          ctx.lineWidth = 2.8;
          ctx.beginPath();
          ctx.arc(x + 20, peTop + 20, 10, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(x + 56, peTop + 20, 10, 0, Math.PI * 2);
          ctx.stroke();

          // left operator: cross
          ctx.beginPath();
          ctx.moveTo(x + 14, peTop + 14);
          ctx.lineTo(x + 26, peTop + 26);
          ctx.moveTo(x + 26, peTop + 14);
          ctx.lineTo(x + 14, peTop + 26);
          ctx.stroke();

          // right operator: plus
          ctx.beginPath();
          ctx.moveTo(x + 56, peTop + 14);
          ctx.lineTo(x + 56, peTop + 26);
          ctx.moveTo(x + 50, peTop + 20);
          ctx.lineTo(x + 62, peTop + 20);
          ctx.stroke();

          // local weight band
          ctx.fillStyle = "#0ea767";
          ctx.fillRect(x + 5, peTop + 40, peW - 10, peH - 45);
          ctx.fillStyle = "#e5e7eb";
          ctx.font = "bold 20px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(`W${i}`, x + peW / 2, peTop + peH - 14);

          // inter-PE psum arrows
          if (i < PE_COUNT - 1) {
            const psumY = peTop + peH - 24;
            drawRightArrow(x + peW + 3, psumY, x + peW + peGap - 8, "#ef4444", 4, 8);
          }

          // activation taps down from bus
          const tapX = x + peW / 2;
          drawArrow(tapX, busY, tapX, peTop - 2, "#2563eb", 5);

          // broadcast token replicated at each PE tap
          ctx.fillStyle = "#dbeafe";
          ctx.strokeStyle = "#2563eb";
          ctx.lineWidth = 1.5;
          roundedRect(tapX - 14, busY - 24, 28, 18, 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#1e3a8a";
          ctx.font = "bold 12px monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(active), tapX, busY - 15);
        }

        // Activation token at global buffer output (broadcast source)
        const tokenX = gbX + gbW / 2;
        const tokenY = gbY + gbH + 20;
        ctx.fillStyle = "#dbe5f2";
        ctx.strokeStyle = "#475569";
        ctx.lineWidth = 2;
        roundedRect(tokenX - 24, tokenY - 18, 48, 36, 1);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 22px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(active), tokenX, tokenY + 1);

        // Broadcast arrow from global buffer token to activation bus
        drawArrow(tokenX, tokenY + 18, tokenX, busY - 4, "#2563eb", 5);

        // Moving output-focus tokens (red) under the array
        const weightY = peTop + peH + 70;
        function drawOutputFocusToken(x, value) {
          ctx.fillStyle = "#e8c4c0";
          ctx.strokeStyle = "#3f3f46";
          ctx.lineWidth = 2;
          roundedRect(x, weightY, 42, 34, 0);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#111827";
          ctx.font = "bold 18px monospace";
          ctx.textAlign = "center";
          ctx.fillText(String(value), x + 21, weightY + 17);
        }

        const movingPos = Math.min(PE_COUNT - 1, active);
        const baseTokenX = peStartX + 22;
        const tokenStepX = peW + peGap;

        if (focusMode === "input0") {
          drawOutputFocusToken(baseTokenX + movingPos * tokenStepX, 0);
        } else if (focusMode === "all") {
          // Pipeline view: each next output enters from the left and follows previous outputs.
          // At step t, output o is at PE position (t - o) when within visible range.
          for (let outIdx = 0; outIdx < 4; outIdx++) {
            const pos = active - outIdx;
            if (pos >= 0 && pos < PE_COUNT) {
              drawOutputFocusToken(baseTokenX + pos * tokenStepX, outIdx);
            }
          }
        } else {
          const posOut0 = Math.min(PE_COUNT - 1, active);
          const posOut1 = active - 1;

          // step 0: only output 0 at PE0
          drawOutputFocusToken(baseTokenX + posOut0 * tokenStepX, 0);

          // from step 1 onward: output 1 trails output 0 by one PE
          if (posOut1 >= 0) {
            drawOutputFocusToken(baseTokenX + posOut1 * tokenStepX, 1);
          }
        }

        ctx.fillStyle = "#16a34a";
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("Weight", peStartX - 20, peTop + peH + 40);

        ctx.fillStyle = "#111827";
        ctx.font = "bold 34px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("PE", peStartX + gbW + 14, peTop + 72);

      }

      function draw() {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

        ctx.save();
        ctx.translate(drawOffsetX, drawOffsetY);
        ctx.scale(drawScale, drawScale);
        if (focusMode === "input0") {
          drawTopRows(step, 24, 0, "#dc2626", "Output");
        } else if (focusMode === "all") {
          drawTopRows(step, 24, 0, "#dc2626", "Output");
          drawTopRows(step, 530, 1, "#2563eb", "Output", step > 0, 0, -1, 1);
        } else {
          drawTopRows(step, 24, 0, "#dc2626", "Output");
          // For output 1 lane: input index is one ahead of filter index.
          drawTopRows(step, 530, 1, "#2563eb", "Output", step > 0, 0, -1, 1);
        }
        drawArchitecture(step);
        ctx.restore();
      }

      function nextStep() {
        step = (step + 1) % STEPS;
        draw();
        if (step === 0 && isPlaying) togglePlay();
      }

      function prevStep() {
        step = (step - 1 + STEPS) % STEPS;
        draw();
      }

      function update() {
        if (!isPlaying) return;
        const now = Date.now();
        const speed = 520;
        if (now - lastTime > speed) {
          nextStep();
          lastTime = now;
        }
        requestAnimationFrame(update);
      }

      function togglePlay() {
        isPlaying = !isPlaying;
        playIcon.innerText = isPlaying ? "⏸" : "▶";
        if (isPlaying) {
          lastTime = Date.now();
          update();
        }
      }

      backBtn.addEventListener("click", () => {
        if (isPlaying) togglePlay();
        prevStep();
      });

      nextBtn.addEventListener("click", () => {
        if (isPlaying) togglePlay();
        nextStep();
      });

      playBtn.addEventListener("click", togglePlay);

      resetBtn.addEventListener("click", () => {
        step = 0;
        if (isPlaying) togglePlay();
        draw();
      });

      focusInput0Btn.addEventListener("click", () => {
        focusMode = "input0";
        updateFocusButtons();
        draw();
      });

      focusBothBtn.addEventListener("click", () => {
        focusMode = "both";
        updateFocusButtons();
        draw();
      });

      focusAllBtn.addEventListener("click", () => {
        focusMode = "all";
        updateFocusButtons();
        draw();
      });

      window.addEventListener("resize", resize);

      setTimeout(() => {
        updateFocusButtons();
        resize();
      }, 100);
    })();
  </script>
</body>

</html>
