name: Consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-consistency:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run consistency checker
        run: python scripts/check-consistency.py

      - name: Run catalog smoke test
        run: python scripts/smoke-test-catalog.py
