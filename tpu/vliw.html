<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Architectures: CISC vs RISC vs VLIW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        canvas {
            image-rendering: crisp-edges;
        }

        .tab-btn {
            transition: all 0.2s ease;
            position: relative;
        }
        
        .tab-btn.active {
            color: #2563eb;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #2563eb;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center py-8">

    <div class="max-w-6xl w-full px-4">
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">Instruction Set Architectures</h1>
            <p class="text-slate-500 mb-6">Visualizing how CPUs handle complexity and parallelism</p>
            
            <!-- Architecture Tabs -->
            <div class="flex justify-center space-x-8 border-b border-slate-200 mb-6">
                <button onclick="switchMode('CISC')" id="tab-CISC" class="tab-btn pb-3 text-lg font-semibold text-slate-400 hover:text-slate-600">CISC</button>
                <button onclick="switchMode('RISC')" id="tab-RISC" class="tab-btn pb-3 text-lg font-semibold text-slate-400 hover:text-slate-600">RISC</button>
                <button onclick="switchMode('VLIW')" id="tab-VLIW" class="tab-btn pb-3 text-lg font-semibold text-slate-400 hover:text-slate-600 active">VLIW</button>
            </div>
        </header>
        
        <!-- Step Indicators -->
        <div class="flex justify-center mb-6 space-x-3" id="step-indicators"></div>

        <!-- Explanation Panel -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 min-h-[140px] flex flex-col items-center justify-center text-center">
            <h2 id="step-title" class="text-xl font-bold text-blue-600 mb-2"></h2>
            <p id="explanation-text" class="text-lg text-slate-700 max-w-3xl leading-relaxed"></p>
        </div>

        <!-- Canvas Container -->
        <div class="relative w-full aspect-[10/7] bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden" id="canvas-container">
            <canvas id="vliw-canvas" class="w-full h-full block"></canvas>
        </div>

        <!-- Controls -->
        <div class="mt-8 flex justify-center items-center space-x-6">
            <button id="btn-prev" class="px-6 py-3 bg-white hover:bg-slate-50 text-slate-800 rounded-lg font-semibold transition disabled:opacity-50 border border-slate-300 shadow-sm">
                &larr; Previous
            </button>
            
            <button id="btn-next" class="px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition transform hover:scale-105 disabled:opacity-50 disabled:hover:scale-100">
                Next &rarr;
            </button>

            <button id="btn-reset" class="px-6 py-3 bg-white hover:bg-slate-50 text-slate-800 rounded-lg font-semibold transition border border-slate-300 shadow-sm">
                Reset
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vliw-canvas');
        const ctx = canvas.getContext('2d');
        const LOGICAL_W = 1000;
        const LOGICAL_H = 700;

        let currentMode = 'VLIW';
        let currentStep = 0;
        let progress = 0;
        let animationStartTime = 0;
        let isAnimating = false;
        let animationDuration = 1200;

        const architectureStyles = {
            CISC: { color: '#ef4444', stroke: '#b91c1c', bg: '#fee2e2' },
            RISC: { color: '#10b981', stroke: '#047857', bg: '#d1fae5' },
            VLIW: { color: '#3b82f6', stroke: '#1d4ed8', bg: '#dbeafe' }
        };

        const stepsData = {
            CISC: [
                { title: "CISC Philosophy", text: "Complex Instruction Set Computer (CISC) reduces instructions by making each one powerful. One line of code = One instruction." },
                { title: "The Macro Instruction", text: "Hardware fetches a single powerful instruction like 'ADD [EBX], EAX'. This instruction performs memory load, addition, and memory store internally." },
                { title: "Decoding Complexity", text: "Because the instruction is complex, hardware must decode it into internal micro-ops using a large Microcode ROM." },
                { title: "Sequential Execution", text: "Inside the CPU, the complex instruction is split into simple internal steps: 1. LOAD, 2. ADD, 3. STORE. These run sequentially in hardware." }
            ],
            RISC: [
                { title: "RISC Philosophy", text: "Reduced Instruction Set Computer (RISC) uses simple, uniform instructions. This allows hardware to be extremely fast and efficient." },
                { title: "Compiler Logic", text: "The compiler breaks down the high-level operation into three simple instructions: LOAD, ADD, and STORE. Hardware stays simple while software does the work." },
                { title: "Instruction Pipeline (LOAD)", text: "Stage 1: FETCH the LOAD instruction from memory. Stage 2: DECODE it. Stage 3: EXECUTE memory access." },
                { title: "Instruction Pipeline (ADD)", text: "Stage 1: FETCH the ADD instruction. Stage 2: DECODE it. Stage 3: EXECUTE register addition." },
                { title: "Instruction Pipeline (STORE)", text: "Stage 1: FETCH the STORE instruction. Stage 2: DECODE it. Stage 3: EXECUTE memory write." }
            ],
            VLIW: [
                { title: "VLIW Philosophy", text: "Very Long Instruction Word (VLIW) relies on the compiler to schedule parallel tasks explicitly before execution begins." },
                { title: "Compiler: Loop Unrolling", text: "The compiler 'unrolls' the loop, expanding 1 iteration into 3 independent operations. This exposes enough work to keep multiple ALUs busy." },
                { title: "Bundling (The Long Word)", text: "The compiler bundles these independent operations into one 'Very Long' instruction. Each slot in the word is pre-assigned to a specific hardware ALU." },
                { title: "Zero-Scheduler Dispatch", text: "Hardware simply 'unzips' the long word. No complex dynamic scheduling is needed—each operation goes directly to its ALU slot." },
                { title: "Massive Parallel Execution", text: "All ALUs execute simultaneously. This static parallelism is key to the efficiency of Google's TPU." }
            ]
        };

        // --- Layout Constants ---
        const vliwBox = { x: 200, y: 80, w: 600, h: 45 };
        const fuY = 220;
        const memY = 380;
        const codeBox = { x: 50, y: 480, w: 900, h: 180 };

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            goToStep(0);
        }

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        // --- Drawing Helpers ---
        function drawRect(x, y, w, h, fill, stroke, thick=false, shadow=false) {
            if (shadow) {
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;
            }
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 6);
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
            if (stroke) {
                ctx.strokeStyle = stroke;
                ctx.lineWidth = thick ? 3 : 1.5;
                ctx.stroke();
            }
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        }

        function drawText(text, x, y, font, color, align='center', baseline='middle') {
            ctx.font = font;
            ctx.fillStyle = color;
            ctx.textAlign = align;
            ctx.textBaseline = baseline;
            ctx.fillText(text, x, y);
        }

        function drawHardwareLayout() {
            const style = architectureStyles[currentMode];
            drawRect(150, 40, 700, 400, '#fff', '#e2e8f0', false, true);
            drawText("PROCESSOR HARDWARE", 500, 25, "bold 12px Inter", "#94a3b8");

            if (currentMode === 'CISC') {
                drawRect(250, 80, 500, 60, style.bg, style.stroke, true);
                drawText("COMPLEX DECODER (Microcode ROM)", 500, 110, "bold 16px Inter", style.stroke);
                drawRect(350, 220, 300, 80, '#fff', '#cbd5e1');
                drawText("EXECUTION ENGINE", 500, 260, "bold 14px Inter", "#475569");
            } 
            else if (currentMode === 'RISC') {
                const stages = ["FETCH", "DECODE", "EXECUTE"];
                for(let i=0; i<3; i++) {
                    const x = 200 + i*200;
                    drawRect(x, 80, 180, 220, i === 2 ? '#fff' : style.bg, i === 2 ? '#cbd5e1' : style.stroke);
                    drawText(stages[i], x+90, 100, "bold 14px Inter", i === 2 ? "#64748b" : style.stroke);
                }
                drawText("ALU", 700, 190, "bold 16px Inter", "#475569");
            }
            else if (currentMode === 'VLIW') {
                drawRect(vliwBox.x, vliwBox.y, vliwBox.w, vliwBox.h, style.bg, style.stroke, true);
                for(let i=1; i<3; i++) {
                    ctx.beginPath(); ctx.moveTo(vliwBox.x + i*200, vliwBox.y); ctx.lineTo(vliwBox.x + i*200, vliwBox.y+vliwBox.h);
                    ctx.strokeStyle = style.stroke; ctx.stroke();
                }
                
                const vliwOps = ["ADD i", "ADD i+1", "ADD i+2"];
                const slotLabels = ["SLOT 1", "SLOT 2", "SLOT 3"];
                // PERSISTENCE: Instructions stay in slots once bundled (Step 2+)
                const showOps = currentStep > 2 || (currentStep === 2 && !isAnimating);
                
                for(let i=0; i<3; i++) {
                    const text = showOps ? vliwOps[i] : slotLabels[i];
                    drawText(text, 300 + i*200, 102, "bold 12px Inter", style.stroke);
                }

                for(let i=0; i<3; i++) {
                    const x = 260 + i*200;
                    drawRect(x, fuY, 80, 80, '#fff', '#cbd5e1');
                    drawText("ALU " + (i+1), x+40, fuY+40, "bold 14px Inter", "#475569");
                }
            }

            drawRect(200, 380, 600, 40, '#f8fafc', '#cbd5e1');
            drawText("DATA MEMORY / REGISTERS", 500, 400, "bold 12px Inter", "#64748b");
        }

        function drawCodeExample() {
            drawRect(codeBox.x, codeBox.y, codeBox.w, codeBox.h, '#fff', '#e2e8f0', false, true);
            drawText("SOFTWARE / COMPILER VIEW", 500, codeBox.y + 20, "bold 12px Inter", "#94a3b8");
            
            const font = "16px 'Fira Code', monospace";
            const leftX = 80;
            const topY = codeBox.y + 65;

            drawText("for (i=0; i<N; i++) {", leftX, topY, font, "#94a3b8", "left");
            drawText("  B[i] = A[i] + C;", leftX, topY + 30, font, "#1e293b", "left");
            drawText("}", leftX, topY + 60, font, "#94a3b8", "left");

            ctx.beginPath(); ctx.moveTo(350, codeBox.y + 40); ctx.lineTo(350, codeBox.y + 160);
            ctx.strokeStyle = "#e2e8f0"; ctx.stroke();

            const rightX = 380;
            const style = architectureStyles[currentMode];

            if (currentMode === 'CISC') {
                drawText("// One complex instruction", rightX, topY, font, "#94a3b8", "left");
                drawText("ADD [EBX], EAX", rightX, topY + 40, "bold 20px 'Fira Code'", style.color, "left");
            } 
            else if (currentMode === 'RISC') {
                const riscOps = ["LOAD  R1, [R2]", "ADD   R1, R1, R3", "STORE R1, [R2]"];
                riscOps.forEach((op, i) => {
                    const isStep = (currentStep - 2 === i);
                    drawText(op, rightX, topY + 30 + i*30, isStep ? "bold 16px 'Fira Code'" : font, isStep ? style.color : "#64748b", "left");
                });
            } 
            else if (currentMode === 'VLIW') {
                if (currentStep === 1) {
                    drawText("// Compiler unrolls loop 3 times:", rightX, topY - 10, font, "#2563eb", "left");
                    drawText("B[i]   = A[i]   + C;", rightX, topY + 30, font, style.color, "left");
                    drawText("B[i+1] = A[i+1] + C;", rightX, topY + 60, font, style.color, "left");
                    drawText("B[i+2] = A[i+2] + C;", rightX, topY + 90, font, style.color, "left");
                } else {
                    drawText("// Bundled into slots", rightX, topY - 10, font, "#94a3b8", "left");
                    drawText("[ ADD i | ADD i+1 | ADD i+2 ]", rightX, topY + 40, "bold 16px 'Fira Code'", style.color, "left");
                }
            }
        }

        function drawAnimations() {
            if (!isAnimating) return;
            const p = progress;
            const style = architectureStyles[currentMode];

            if (currentMode === 'RISC' && currentStep >= 2 && currentStep <= 4) {
                const stepIdx = currentStep - 2;
                const stages = [290, 490, 690];
                const stageY = 190;
                const totalStages = 3;
                const stageProgress = p * totalStages;
                const currentStage = Math.floor(stageProgress);
                const localP = stageProgress % 1;

                if (currentStage < totalStages) {
                    const x1 = currentStage === 0 ? 380 : stages[currentStage-1];
                    const x2 = stages[currentStage];
                    const x = x1 + (x2 - x1) * localP;
                    drawRect(x - 40, stageY - 20, 80, 40, style.color, "#fff", true);
                    const labels = ["LOAD", "ADD", "STORE"];
                    drawText(labels[stepIdx], x, stageY, "bold 12px 'Fira Code'", "#fff");
                }
            }

            if (currentMode === 'VLIW') {
                if (currentStep === 1) { // Unrolling pulse
                    ctx.globalAlpha = Math.sin(p * Math.PI) * 0.3;
                    drawRect(380, codeBox.y + 60, 250, 95, style.bg, style.color);
                    ctx.globalAlpha = 1;
                }
                if (currentStep === 2) { // Parallel Bundle
                    const vliwOps = ["ADD i", "ADD i+1", "ADD i+2"];
                    for(let i=0; i<3; i++) {
                        const targetX = 300 + i*200;
                        const startY = codeBox.y + 65 + i*30;
                        const x = 380 + (targetX - 380) * p;
                        const y = startY + (102 - startY) * p;
                        drawRect(x - 45, y - 15, 90, 30, style.color, "#fff", true);
                        drawText(vliwOps[i], x, y, "bold 10px Inter", "#fff");
                    }
                }
                if (currentStep === 3) { // Direct Dispatch
                    for(let i=0; i<3; i++) {
                        const x = 300 + i*200;
                        const y = 125 + (fuY - 125) * p;
                        drawRect(x - 30, y - 12, 60, 24, style.color, "#fff");
                    }
                }
            }

            if (currentMode === 'CISC' && currentStep === 1) {
                const y = (codeBox.y + 100) + (110 - (codeBox.y + 100)) * p;
                drawRect(400, y - 20, 200, 40, style.color, "#fff", true);
                drawText("ADD [EBX], EAX", 500, y, "bold 12px 'Fira Code'", "#fff");
            }
        }

        function draw() {
            const dpr = window.devicePixelRatio || 1;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const scale = Math.min(canvas.width / (LOGICAL_W * dpr), canvas.height / (LOGICAL_H * dpr)) * dpr;
            ctx.translate((canvas.width - LOGICAL_W * scale) / 2, (canvas.height - LOGICAL_H * scale) / 2);
            ctx.scale(scale, scale);

            drawHardwareLayout();
            drawCodeExample();
            drawAnimations();
        }

        function updateAnimation(time) {
            if (isAnimating) {
                if (animationStartTime === 0) animationStartTime = time;
                let elapsed = time - animationStartTime;
                progress = Math.min(elapsed / animationDuration, 1);
                if (progress >= 1) isAnimating = false;
            }
            draw();
            requestAnimationFrame(updateAnimation);
        }

        function goToStep(s) {
            const steps = stepsData[currentMode];
            if (s < 0) s = 0;
            if (s >= steps.length) s = steps.length - 1;
            currentStep = s;
            isAnimating = true;
            animationStartTime = 0;
            progress = 0;
            if (currentMode === 'RISC' && s >= 2) animationDuration = 1800;
            else animationDuration = 1000;

            document.getElementById('step-title').innerText = steps[s].title;
            document.getElementById('explanation-text').innerText = steps[s].text;
            document.getElementById('btn-prev').disabled = (s === 0);
            document.getElementById('btn-next').disabled = (s === steps.length - 1);

            const indicators = document.getElementById('step-indicators');
            indicators.innerHTML = '';
            steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `w-3 h-3 rounded-full transition-all duration-300 ${i === s ? 'bg-blue-600 scale-125' : (i < s ? 'bg-blue-300' : 'bg-slate-200')}`;
                indicators.appendChild(dot);
            });
        }

        document.getElementById('btn-next').addEventListener('click', () => goToStep(currentStep + 1));
        document.getElementById('btn-prev').addEventListener('click', () => goToStep(currentStep - 1));
        document.getElementById('btn-reset').addEventListener('click', () => goToStep(0));

        window.onload = () => {
            switchMode('VLIW');
            requestAnimationFrame(updateAnimation);
            resizeCanvas();
        };
    </script>
</body>
</html>
